<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Мир детских игрушек</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>🎨 Мир Детских Игрушек</h1>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="catalog.html">Каталог</a></li>
                    <li><a href="benefits.html">Польза и развитие</a></li>
                    <li id="user-menu">
                        <span id="user-greeting"></span>
                        <div class="user-dropdown">
                            <a href="profile.html" id="profile-link">Личный кабинет</a>
                            <a href="cart.html">Корзина (<span id="cart-counter">0</span>)</a>
                            <a href="#" id="logout-link">Выйти</a>
                        </div>
                    </li>
                    <li id="guest-menu">
                        <a href="login.html" class="btn-login">Войти</a>
                        <a href="register.html" class="btn-register">Регистрация</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <div class="container">
                <div class="auth-card">
                    <h2>Создать аккаунт</h2>
                    
                    <form id="register-form" class="auth-form">
                        <div class="form-group">
                            <label for="register-name">Имя</label>
                            <input type="text" id="register-name" name="name" required 
                                   placeholder="Иван Иванов">
                        </div>
                        
                        <div class="form-group">
                            <label for="register-email">Email</label>
                            <input type="email" id="register-email" name="email" required 
                                   placeholder="example@mail.ru">
                        </div>
                        
                        <div class="form-group">
                            <label for="register-phone">Телефон</label>
                            <input type="tel" id="register-phone" name="phone" 
                                   placeholder="+7 (999) 123-45-67">
                        </div>
                        
                        <div class="form-group">
                            <label for="register-password">Пароль</label>
                            <input type="password" id="register-password" name="password" required 
                                   placeholder="Минимум 8 символов">
                            <div class="password-strength">
                                <div class="strength-bar"></div>
                                <span class="strength-text">Сложность пароля: слабый</span>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="register-confirm">Подтвердите пароль</label>
                            <input type="password" id="register-confirm" name="confirm" required 
                                   placeholder="Повторите пароль">
                        </div>
                        
                        <div class="form-checkbox">
                            <input type="checkbox" id="agree-terms" required>
                            <label for="agree-terms">
                                Я согласен с <a href="#">Пользовательским соглашением</a> 
                                и даю согласие на обработку персональных данных
                            </label>
                        </div>
                        
                        <div class="form-checkbox">
                            <input type="checkbox" id="newsletter" checked>
                            <label for="newsletter">
                                Подписаться на новости и акции
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block">
                            Создать аккаунт
                        </button>
                    </form>
                    
                    <div class="auth-footer">
                        <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <!-- Стандартный footer -->
    </footer>

    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>
</html>
